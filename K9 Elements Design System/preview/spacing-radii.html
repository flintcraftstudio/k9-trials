<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col" style="gap:14px">
    <div style="font-size:15px;font-weight:500">Border radii</div>
    <div class="mono">Restrained · no blob rounding</div>
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-top:4px">
      <div class="col" style="gap:6px;align-items:center"><div style="width:64px;height:64px;background:var(--mist-200);border-radius:4px;border:1px solid var(--mist-300)"></div><div class="mono">sm · 4</div></div>
      <div class="col" style="gap:6px;align-items:center"><div style="width:64px;height:64px;background:var(--mist-200);border-radius:6px;border:1px solid var(--mist-300)"></div><div class="mono">md · 6 · input</div></div>
      <div class="col" style="gap:6px;align-items:center"><div style="width:64px;height:64px;background:var(--mist-200);border-radius:12px;border:1px solid var(--mist-300)"></div><div class="mono">lg · 12 · card</div></div>
      <div class="col" style="gap:6px;align-items:center"><div style="width:64px;height:64px;background:var(--mist-200);border-radius:16px;border:1px solid var(--mist-300)"></div><div class="mono">xl · 16</div></div>
      <div class="col" style="gap:6px;align-items:center"><div style="width:64px;height:64px;background:var(--mist-200);border-radius:24px;border:1px solid var(--mist-300)"></div><div class="mono">2xl · 24 · hero</div></div>
      <div class="col" style="gap:6px;align-items:center"><div style="width:64px;height:64px;background:var(--mist-200);border-radius:9999px;border:1px solid var(--mist-300)"></div><div class="mono">full · pill</div></div>
    </div>
  </div>
</div>
</body></html>

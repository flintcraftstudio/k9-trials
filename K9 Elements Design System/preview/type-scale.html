<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col" style="gap:16px">
    <div class="row" style="align-items:baseline;gap:16px">
      <span class="serif" style="font-size:64px;line-height:1;letter-spacing:-0.02em">H1</span>
      <span class="mono">Instrument Serif · 80/80 · tracking -0.02em</span>
    </div>
    <div class="row" style="align-items:baseline;gap:16px">
      <span class="serif" style="font-size:44px;line-height:1.1;letter-spacing:-0.015em">H2</span>
      <span class="mono">Instrument Serif · 48/56</span>
    </div>
    <div class="row" style="align-items:baseline;gap:16px">
      <span style="font-size:18px;font-weight:500">Lede</span>
      <span class="mono">Instrument Sans · 18/32 · color fg-muted</span>
    </div>
    <div class="row" style="align-items:baseline;gap:16px">
      <span style="font-size:16px">Body</span>
      <span class="mono">Instrument Sans · 16/28 · color fg-muted</span>
    </div>
    <div class="row" style="align-items:baseline;gap:16px">
      <span style="font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--blue-600)">EYEBROW</span>
      <span class="mono">Instrument Sans 600 uppercase · 12/28 · event color</span>
    </div>
  </div>
</div>
</body></html>

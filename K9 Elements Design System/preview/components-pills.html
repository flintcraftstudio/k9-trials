<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.pill { display:inline-flex;align-items:center;gap:6px;padding:2px 10px;border-radius:9999px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.dot { width:6px;height:6px;border-radius:9999px;background:currentColor }
.announce { display:inline-flex;align-items:center;gap:10px;padding:2px 12px;background: rgb(from var(--mist-950) r g b / 0.05);border-radius:9999px;font-size:13px }
.announce .sep { width:1px;height:12px;background: rgb(from var(--mist-950) r g b / 0.2) }
.announce .cta { font-weight:600;display:inline-flex;align-items:center;gap:6px }
</style>
</head>
<body>
<div class="card">
  <div class="col" style="gap:14px">
    <div style="font-size:15px;font-weight:500">Pills &amp; announcement badges</div>

    <div class="col" style="gap:8px">
      <div class="label">Trial-status pills</div>
      <div class="row wrap" style="gap:8px">
        <span class="pill" style="background:var(--green-100);color:var(--green-700)"><span class="dot"></span>Open</span>
        <span class="pill" style="background:var(--orange-100);color:var(--orange-700)"><span class="dot"></span>Waitlist</span>
        <span class="pill" style="background:#fce8e6;color:#b3261e"><span class="dot"></span>Closed</span>
        <span class="pill" style="background:var(--blue-100);color:var(--blue-700)"><span class="dot"></span>Brief out</span>
        <span class="pill" style="background:var(--mist-200);color:var(--mist-700)"><span class="dot"></span>Draft</span>
      </div>
    </div>

    <div class="col" style="gap:8px">
      <div class="label">Event tags</div>
      <div class="row wrap" style="gap:8px">
        <span class="pill" style="background:var(--blue-50);color:var(--blue-700)">Obedience</span>
        <span class="pill" style="background:var(--char-100);color:var(--char-800)">Protection</span>
        <span class="pill" style="background:var(--green-50);color:var(--green-700)">Tracking</span>
        <span class="pill" style="background:var(--orange-50);color:var(--orange-700)">Detection</span>
      </div>
    </div>

    <div class="col" style="gap:8px">
      <div class="label">Announcement badge</div>
      <a href="#" class="announce" style="color:var(--mist-950);text-decoration:none">
        <span>Spring trial schedule is live</span>
        <span class="sep"></span>
        <span class="cta">Learn more <img src="../assets/icons/chevron-right.svg" alt="" style="width:5px;height:8px"></span>
      </a>
    </div>
  </div>
</div>
</body></html>

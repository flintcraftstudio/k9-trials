<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col" style="gap:14px">
    <div style="font-size:15px;font-weight:500">Elevation</div>
    <div class="mono">Minimal use · borders &amp; tinted surfaces preferred over shadows</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:8px">
      <div class="col" style="gap:8px;align-items:center">
        <div style="width:140px;height:80px;background:#fff;border-radius:8px;box-shadow:var(--shadow-sm)"></div>
        <div class="mono">sm · resting card</div>
      </div>
      <div class="col" style="gap:8px;align-items:center">
        <div style="width:140px;height:80px;background:#fff;border-radius:8px;box-shadow:var(--shadow-md)"></div>
        <div class="mono">md · popover</div>
      </div>
      <div class="col" style="gap:8px;align-items:center">
        <div style="width:140px;height:80px;background:#fff;border-radius:8px;box-shadow:var(--shadow-lg)"></div>
        <div class="mono">lg · modal</div>
      </div>
    </div>
  </div>
</div>
</body></html>

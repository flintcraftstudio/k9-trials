<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{padding:24px;background:var(--paper-2)}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.lbl{font:var(--t-micro);text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);width:90px}
.title-badge{padding:8px 12px;border-radius:var(--r-sm);font-family:var(--font-display);font-size:14px;letter-spacing:1px;color:#fff;display:inline-flex;align-items:center}
.ob{background:var(--brand-orange)} .pr{background:var(--brand-blue)} .tr{background:var(--brand-green)} .dt{background:var(--ink-3)}
.pill{background:var(--paper-2);padding:4px 10px;border-radius:var(--r-pill);font-size:12px;color:var(--ink-2);border:1px solid var(--line)}
.chip{font-size:10px;background:var(--paper-2);padding:2px 8px;border-radius:var(--r-pill);color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.tag{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;text-transform:uppercase;letter-spacing:0.5px;color:#fff;font-weight:700}
.tag.minor{background:var(--warning)} .tag.major{background:var(--danger)}
</style></head><body>
<div class="row"><span class="lbl">Title</span>
  <span class="title-badge ob">K9E1-OB · 84pt</span>
  <span class="title-badge pr">K9E1-PR · 76pt</span>
  <span class="title-badge tr">K9E1-TR · Pass</span>
  <span class="title-badge dt">K9E1-DT · 88pt</span>
</div>
<div class="row"><span class="lbl">Pills</span>
  <span class="pill">Handler</span>
  <span class="pill">Apprentice Decoy</span>
  <span class="pill">Member since 2023</span>
</div>
<div class="row"><span class="lbl">Chips</span>
  <span class="chip">#out</span>
  <span class="chip">#grip</span>
  <span class="chip">#focus</span>
  <span class="chip">#prey-drive</span>
</div>
<div class="row"><span class="lbl">Deduction</span>
  <span><span class="tag minor">Minor</span> Slow drop on Sit · −2</span>
  <span><span class="tag major">Major</span> Repeated commands · −5</span>
</div>
</body></html>

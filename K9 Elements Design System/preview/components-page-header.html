<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{padding:24px;background:var(--paper-2)}
.head{background:var(--ink);color:#fff;padding:18px 24px;border-bottom:4px solid;border-image:var(--brand-spine) 1;border-radius:var(--r-md) var(--r-md) 0 0}
.head h1{font-family:var(--font-display);font-size:28px;letter-spacing:2px;margin:0;text-transform:uppercase}
.head .sub{color:var(--muted-2);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;margin-top:4px}
.bar{display:flex;background:#fff;padding:8px 24px;gap:4px;border:1px solid var(--line);border-top:0;border-radius:0 0 var(--r-md) var(--r-md);box-shadow:var(--shadow-1)}
.bar a{padding:6px 12px;font-size:12px;color:var(--muted);font-weight:500;border-radius:var(--r-sm);text-decoration:none}
.bar a.cur{background:var(--ink);color:#fff}
</style></head><body>
<div class="head"><h1>K9 Elements — Operations</h1><div class="sub">Spine border under the header is the signature</div></div>
<div class="bar"><a class="cur">Dashboard</a><a>Events</a><a>Live Scoring</a><a>Title Processing</a><a>Grievances</a></div>
</body></html>

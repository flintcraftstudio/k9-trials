<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col" style="gap:12px">
    <div style="font-size:15px;font-weight:500">Spacing scale</div>
    <div class="mono">4px base · used for gaps, padding, vertical rhythm</div>
    <div class="col" style="gap:6px;margin-top:6px">
      <div class="row" style="gap:12px"><div style="width:4px;height:14px;background:var(--mist-950)"></div><span class="mono" style="width:40px">4</span><span class="mono">--space-1</span></div>
      <div class="row" style="gap:12px"><div style="width:8px;height:14px;background:var(--mist-950)"></div><span class="mono" style="width:40px">8</span><span class="mono">--space-2</span></div>
      <div class="row" style="gap:12px"><div style="width:12px;height:14px;background:var(--mist-950)"></div><span class="mono" style="width:40px">12</span><span class="mono">--space-3</span></div>
      <div class="row" style="gap:12px"><div style="width:16px;height:14px;background:var(--mist-950)"></div><span class="mono" style="width:40px">16</span><span class="mono">--space-4 · default gap</span></div>
      <div class="row" style="gap:12px"><div style="width:24px;height:14px;background:var(--mist-950)"></div><span class="mono" style="width:40px">24</span><span class="mono">--space-6 · gutter</span></div>
      <div class="row" style="gap:12px"><div style="width:40px;height:14px;background:var(--mist-950)"></div><span class="mono" style="width:40px">40</span><span class="mono">--space-10 · gutter-lg</span></div>
      <div class="row" style="gap:12px"><div style="width:64px;height:14px;background:var(--mist-950)"></div><span class="mono" style="width:40px">64</span><span class="mono">--space-16 · section padding</span></div>
      <div class="row" style="gap:12px"><div style="width:96px;height:14px;background:var(--mist-950)"></div><span class="mono" style="width:40px">96</span><span class="mono">--space-24 · hero padding</span></div>
    </div>
  </div>
</div>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.faq { border-top:1px solid rgb(from var(--mist-950) r g b / 0.10);border-bottom:1px solid rgb(from var(--mist-950) r g b / 0.10) }
.faq > div { border-bottom:1px solid rgb(from var(--mist-950) r g b / 0.10) }
.faq > div:last-child { border-bottom:0 }
.faq button { background:transparent;border:0;width:100%;display:flex;justify-content:space-between;align-items:flex-start;gap:24px;padding:16px 0;text-align:left;font:inherit;font-size:16px;color:var(--mist-950);cursor:pointer }
.faq button img { margin-top:6px;width:13px;height:13px }
.faq .ans { padding:0 48px 16px 0;font-size:14px;color:var(--mist-700);line-height:1.7;margin-top:-8px }
</style>
</head>
<body>
<div class="card" style="background:transparent;padding:24px">
  <div class="faq">
    <div>
      <button><span>What does a guided development path include?</span><img src="../assets/icons/minus.svg" alt=""></button>
      <div class="ans">Twelve weeks of structured sessions, each with a written drill, a reference video, and judge-style criteria. You log every session, and the path branches based on what you scored.</div>
    </div>
    <div>
      <button><span>How are trial entries judged?</span><img src="../assets/icons/plus.svg" alt=""></button>
    </div>
    <div>
      <button><span>Can I enter as a handler without a paid membership?</span><img src="../assets/icons/plus.svg" alt=""></button>
    </div>
  </div>
</div>
</body></html>

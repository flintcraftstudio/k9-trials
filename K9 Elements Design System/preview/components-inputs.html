<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.field { display:flex;flex-direction:column;gap:6px }
.field label { font-size:13px;font-weight:500;color:var(--mist-800) }
.input { font:inherit;font-size:14px;line-height:1.5;padding:8px 12px;background:#fff;border:1px solid var(--mist-300);border-radius:6px;width:100%;color:var(--mist-950);outline:none }
.input:focus { border-color:var(--mist-950);box-shadow:0 0 0 3px rgb(from var(--mist-950) r g b / 0.10) }
.underline { display:flex;align-items:center;border-bottom:1px solid rgb(from var(--mist-950) r g b / 0.2);padding:6px 0 }
.underline:focus-within { border-bottom-color:var(--mist-950) }
.underline input { flex:1;border:0;font:inherit;font-size:14px;color:var(--mist-950);background:transparent;outline:none }
.underline button { background:transparent;border:0;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:9999px;cursor:pointer;color:var(--mist-950) }
.underline button:hover { background:rgb(from var(--mist-950) r g b / 0.08) }
</style>
</head>
<body>
<div class="card">
  <div class="col" style="gap:14px">
    <div style="font-size:15px;font-weight:500">Form inputs</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="field">
        <label>Handler name</label>
        <input class="input" type="text" value="Sam Reichelt" />
      </div>
      <div class="field">
        <label>Dog</label>
        <input class="input" type="text" placeholder="Call name &amp; breed" />
      </div>
    </div>
    <div class="col" style="gap:6px">
      <div class="label">Newsletter signup (underline variant)</div>
      <div class="underline">
        <input type="email" placeholder="Email" aria-label="Email" />
        <button aria-label="Subscribe"><img src="../assets/icons/arrow-right.svg" alt=""></button>
      </div>
    </div>
  </div>
</div>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col" style="gap:14px">
    <div class="spread">
      <div class="row" style="gap:10px;align-items:center">
        <div style="width:18px;height:18px;border-radius:4px;background:var(--blue-600)"></div>
        <div>
          <div style="font-size:15px;font-weight:500">Obedience</div>
          <div class="mono">Precision · control · heelwork &nbsp; <span style="color:var(--blue-700);font-weight:600">#066D9E</span></div>
        </div>
      </div>
      <div class="mono">data-event="obedience"</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(11,1fr);gap:4px">
      <div style="background:var(--blue-50);height:48px;border-radius:4px;border:1px solid var(--mist-200)"></div>
      <div style="background:var(--blue-100);height:48px;border-radius:4px"></div>
      <div style="background:var(--blue-200);height:48px;border-radius:4px"></div>
      <div style="background:var(--blue-300);height:48px;border-radius:4px"></div>
      <div style="background:var(--blue-400);height:48px;border-radius:4px"></div>
      <div style="background:var(--blue-500);height:48px;border-radius:4px"></div>
      <div style="background:var(--blue-600);height:48px;border-radius:4px;outline:2px solid var(--mist-950);outline-offset:1px"></div>
      <div style="background:var(--blue-700);height:48px;border-radius:4px"></div>
      <div style="background:var(--blue-800);height:48px;border-radius:4px"></div>
      <div style="background:var(--blue-900);height:48px;border-radius:4px"></div>
      <div style="background:var(--blue-950);height:48px;border-radius:4px"></div>
    </div>
    <div class="row" style="justify-content:space-between;font-size:10px;color:var(--mist-500);font-family:var(--font-mono)">
      <span>50</span><span>100</span><span>200</span><span>300</span><span>400</span><span>500</span><span style="color:var(--blue-700);font-weight:700">600 ★</span><span>700</span><span>800</span><span>900</span><span>950</span>
    </div>
  </div>
</div>
</body></html>

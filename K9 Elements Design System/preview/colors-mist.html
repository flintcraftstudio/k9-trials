<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col" style="gap:14px">
    <div class="spread">
      <div>
        <div style="font-size:15px;font-weight:500;color:var(--mist-950)">Mist · Neutral spine</div>
        <div class="mono">Cool, slightly green-tinted near-grey · OKLCH</div>
      </div>
      <div class="mono">surface · text · borders</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(11,1fr);gap:4px">
      <div style="background:var(--mist-50);height:54px;border-radius:4px;border:1px solid var(--mist-200)"></div>
      <div style="background:var(--mist-100);height:54px;border-radius:4px;border:1px solid var(--mist-200)"></div>
      <div style="background:var(--mist-200);height:54px;border-radius:4px"></div>
      <div style="background:var(--mist-300);height:54px;border-radius:4px"></div>
      <div style="background:var(--mist-400);height:54px;border-radius:4px"></div>
      <div style="background:var(--mist-500);height:54px;border-radius:4px"></div>
      <div style="background:var(--mist-600);height:54px;border-radius:4px"></div>
      <div style="background:var(--mist-700);height:54px;border-radius:4px"></div>
      <div style="background:var(--mist-800);height:54px;border-radius:4px"></div>
      <div style="background:var(--mist-900);height:54px;border-radius:4px"></div>
      <div style="background:var(--mist-950);height:54px;border-radius:4px"></div>
    </div>
    <div class="row" style="justify-content:space-between;font-size:10px;color:var(--mist-500);font-family:var(--font-mono)">
      <span>50</span><span>100</span><span>200</span><span>300</span><span>400</span><span>500</span><span>600</span><span>700</span><span>800</span><span>900</span><span>950</span>
    </div>
  </div>
</div>
</body></html>

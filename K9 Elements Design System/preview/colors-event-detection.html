<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col" style="gap:14px">
    <div class="spread">
      <div class="row" style="gap:10px;align-items:center">
        <div style="width:18px;height:18px;border-radius:4px;background:var(--orange-600)"></div>
        <div>
          <div style="font-size:15px;font-weight:500">Detection</div>
          <div class="mono">Odor · source · alert &nbsp; <span style="color:var(--orange-700);font-weight:600">#BF692E</span></div>
        </div>
      </div>
      <div class="mono">data-event="detection"</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(11,1fr);gap:4px">
      <div style="background:var(--orange-50);height:48px;border-radius:4px;border:1px solid var(--mist-200)"></div>
      <div style="background:var(--orange-100);height:48px;border-radius:4px"></div>
      <div style="background:var(--orange-200);height:48px;border-radius:4px"></div>
      <div style="background:var(--orange-300);height:48px;border-radius:4px"></div>
      <div style="background:var(--orange-400);height:48px;border-radius:4px"></div>
      <div style="background:var(--orange-500);height:48px;border-radius:4px"></div>
      <div style="background:var(--orange-600);height:48px;border-radius:4px;outline:2px solid var(--mist-950);outline-offset:1px"></div>
      <div style="background:var(--orange-700);height:48px;border-radius:4px"></div>
      <div style="background:var(--orange-800);height:48px;border-radius:4px"></div>
      <div style="background:var(--orange-900);height:48px;border-radius:4px"></div>
      <div style="background:var(--orange-950);height:48px;border-radius:4px"></div>
    </div>
    <div class="row" style="justify-content:space-between;font-size:10px;color:var(--mist-500);font-family:var(--font-mono)">
      <span>50</span><span>100</span><span>200</span><span>300</span><span>400</span><span>500</span><span style="color:var(--orange-700);font-weight:700">600 ★</span><span>700</span><span>800</span><span>900</span><span>950</span>
    </div>
  </div>
</div>
</body></html>

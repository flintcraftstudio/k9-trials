<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:24px;background:var(--paper-2);margin:0}
  .path-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:660px}
  .path-card{
    padding:16px 16px 16px 18px;
    border:1px solid var(--line);
    border-radius:var(--r-md);
    background:#fff;
    position:relative; overflow:hidden;
    transition:transform var(--dur-normal) var(--ease), box-shadow var(--dur-normal) var(--ease);
  }
  .path-card::before{content:'';position:absolute;left:0;top:0;width:4px;height:100%;background:var(--brand-orange)}
  .path-card:nth-child(2)::before{background:var(--brand-blue)}
  .path-card:nth-child(3)::before{background:var(--brand-green)}
  .path-card:nth-child(4)::before{background:var(--ink)}
  .path-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-2)}

  .path-row{display:flex;align-items:flex-start;gap:14px}
  .path-icon{
    flex-shrink:0;
    width:36px;height:36px;
    display:flex;align-items:center;justify-content:center;
    color:var(--ink);
    border:1.5px solid var(--ink);
    border-radius:2px;
    background:#fff;
  }
  .path-card:nth-child(1) .path-icon{color:var(--brand-orange);border-color:var(--brand-orange)}
  .path-card:nth-child(2) .path-icon{color:var(--brand-blue);border-color:var(--brand-blue)}
  .path-card:nth-child(3) .path-icon{color:var(--brand-green);border-color:var(--brand-green)}
  .path-card:nth-child(4) .path-icon{color:var(--ink);border-color:var(--ink)}
  .path-icon svg{width:20px;height:20px;display:block}
  .path-body{min-width:0}
  .path-label{font-family:var(--font-display);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:3px}
  .path-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px;letter-spacing:-.1px}
  .path-desc{font-size:12px;color:var(--muted);line-height:1.45}
</style></head><body>
<div class="path-grid">
  <!-- Handlers · Lucide "target" -->
  <div class="path-card"><div class="path-row">
    <div class="path-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
      </svg>
    </div>
    <div class="path-body">
      <div class="path-label">For Handlers</div>
      <div class="path-title">Compete &amp; Train</div>
      <div class="path-desc">Find events, register, track titles.</div>
    </div>
  </div></div>

  <!-- Officials · Lucide "scale" -->
  <div class="path-card"><div class="path-row">
    <div class="path-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/>
        <path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/>
        <path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/>
      </svg>
    </div>
    <div class="path-body">
      <div class="path-label">For Officials</div>
      <div class="path-title">Judge / Decoy / Secretary</div>
      <div class="path-desc">Apply, certify, manage assignments.</div>
    </div>
  </div></div>

  <!-- Clubs · Lucide "landmark" -->
  <div class="path-card"><div class="path-row">
    <div class="path-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="3" x2="21" y1="22" y2="22"/>
        <line x1="6" x2="6" y1="18" y2="11"/>
        <line x1="10" x2="10" y1="18" y2="11"/>
        <line x1="14" x2="14" y1="18" y2="11"/>
        <line x1="18" x2="18" y1="18" y2="11"/>
        <polygon points="12 2 20 7 4 7"/>
      </svg>
    </div>
    <div class="path-body">
      <div class="path-label">For Clubs</div>
      <div class="path-title">Affiliate &amp; Host Trials</div>
      <div class="path-desc">Affiliation tools and trial planning.</div>
    </div>
  </div></div>

  <!-- Newcomers · Lucide "book-open" -->
  <div class="path-card"><div class="path-row">
    <div class="path-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
    </div>
    <div class="path-body">
      <div class="path-label">For Newcomers</div>
      <div class="path-title">Learn the Sport</div>
      <div class="path-desc">Discipline overviews and getting started.</div>
    </div>
  </div></div>
</div>
</body></html>

<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{padding:20px;background:var(--paper-2)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:108px;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--line);background:var(--white)}
.sw .chip{height:56px}
.sw .meta{padding:7px 10px}
.sw .name{font:var(--t-micro);text-transform:uppercase;letter-spacing:1.5px;color:var(--ink)}
.sw .hex{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:2px}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="meta"><div class="name">Ink</div><div class="hex">#0E1116</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-2)"></div><div class="meta"><div class="name">Ink 2</div><div class="hex">#1C232C</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-3)"></div><div class="meta"><div class="name">Ink 3</div><div class="hex">#2C3540</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--muted)"></div><div class="meta"><div class="name">Muted</div><div class="hex">#6B7380</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--muted-2)"></div><div class="meta"><div class="name">Muted 2</div><div class="hex">#98A0AC</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--line-2);border-bottom:1px solid var(--line-2)"></div><div class="meta"><div class="name">Line 2</div><div class="hex">#D4D9DF</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--paper-2);border-bottom:1px solid var(--line)"></div><div class="meta"><div class="name">Cream</div><div class="hex">#F2F2EC</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--white);border-bottom:1px solid var(--line)"></div><div class="meta"><div class="name">White</div><div class="hex">#FFFFFF</div></div></div>
</div>
</body></html>

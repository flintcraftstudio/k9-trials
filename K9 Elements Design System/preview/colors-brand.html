<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{padding:20px;background:var(--paper-2)}
.row{display:flex;gap:10px;align-items:stretch;flex-wrap:wrap}
.sw{width:120px;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--line);background:var(--white)}
.sw .chip{height:64px}
.sw .meta{padding:8px 10px}
.sw .name{font:var(--t-micro);text-transform:uppercase;letter-spacing:1.5px;color:var(--ink);}
.sw .hex{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:2px}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--brand-orange)"></div><div class="meta"><div class="name">Orange</div><div class="hex">#E67E22</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--brand-blue)"></div><div class="meta"><div class="name">Blue</div><div class="hex">#2D7DB3</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--brand-green)"></div><div class="meta"><div class="name">Green</div><div class="hex">#27AE60</div></div></div>
  <div class="sw" style="width:260px"><div class="chip" style="background:var(--brand-spine)"></div><div class="meta"><div class="name">Brand Spine</div><div class="hex">linear-gradient 90°</div></div></div>
</div>
</body></html>

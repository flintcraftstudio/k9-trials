<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.t { padding:24px;background:rgb(from var(--mist-950) r g b / 0.025);border-radius:8px;display:flex;flex-direction:column;gap:24px;font-size:14px;line-height:1.7;color:var(--mist-950) }
.t blockquote { position:relative;padding-left:0 }
.t blockquote::before { content:"\201C";position:absolute;left:-0.55em;font-family:var(--font-display);color:var(--mist-950) }
.t blockquote::after { content:"\201D";font-family:var(--font-display) }
.t figcaption { display:flex;align-items:center;gap:14px }
.t .avatar { width:42px;height:42px;border-radius:9999px;overflow:hidden;background:linear-gradient(135deg,var(--green-300),var(--green-700));outline:1px solid rgb(0 0 0 / 0.05) }
.t .name { font-weight:600;font-size:14px;color:var(--mist-950) }
.t .by { font-size:13px;color:var(--mist-700) }
</style>
</head>
<body>
<div class="card" style="background:transparent;padding:24px">
  <figure class="t">
    <blockquote>The tracking path got my green dog to a TD title in twelve weeks. The drills are written by judges, and you can feel it in how the criteria scale.</blockquote>
    <figcaption>
      <div class="avatar"></div>
      <div>
        <div class="name">Petra Vogel</div>
        <div class="by">Decoy &amp; handler, Region 4</div>
      </div>
    </figcaption>
  </figure>
</div>
</body></html>

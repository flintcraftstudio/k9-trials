<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col" style="gap:14px">
    <div style="font-size:15px;font-weight:500">Semantic colors</div>
    <div class="mono">Status surfaces · co-opted from event hues where the metaphor fits</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px">
      <div style="padding:16px;background:var(--green-100);border-radius:8px">
        <div style="font-size:12px;font-weight:600;color:var(--green-700);text-transform:uppercase;letter-spacing:.06em">Success</div>
        <div style="font-size:13px;color:var(--green-800);margin-top:4px">Trial entered.</div>
      </div>
      <div style="padding:16px;background:var(--orange-100);border-radius:8px">
        <div style="font-size:12px;font-weight:600;color:var(--orange-700);text-transform:uppercase;letter-spacing:.06em">Warning</div>
        <div style="font-size:13px;color:var(--orange-800);margin-top:4px">Waitlist only.</div>
      </div>
      <div style="padding:16px;background:#fce8e6;border-radius:8px">
        <div style="font-size:12px;font-weight:600;color:#b3261e;text-transform:uppercase;letter-spacing:.06em">Danger</div>
        <div style="font-size:13px;color:#7a1a14;margin-top:4px">Entry closed.</div>
      </div>
      <div style="padding:16px;background:var(--blue-100);border-radius:8px">
        <div style="font-size:12px;font-weight:600;color:var(--blue-700);text-transform:uppercase;letter-spacing:.06em">Info</div>
        <div style="font-size:13px;color:var(--blue-800);margin-top:4px">Brief released.</div>
      </div>
    </div>
  </div>
</div>
</body></html>

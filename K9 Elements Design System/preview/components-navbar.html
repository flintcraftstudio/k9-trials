<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.nav { display:flex;align-items:center;justify-content:space-between;height:64px;padding:0 24px;background:var(--mist-100);border-bottom:1px solid var(--mist-200);gap:16px }
.nav .logo { display:flex;align-items:center;gap:8px }
.nav .logo img { width:28px;height:28px }
.nav .logo span { font-family:var(--font-display);font-size:18px;letter-spacing:0;color:var(--mist-950) }
.nav .links { display:flex;align-items:center;gap:24px;font-size:13px;color:var(--mist-800) }
.nav .links a { color:inherit;text-decoration:none }
.nav .actions { display:flex;align-items:center;gap:8px }
.nav .actions .btn { padding:4px 14px;background:var(--mist-950);color:#fff;border-radius:9999px;font-size:13px;font-weight:500;text-decoration:none }
.nav .actions .plain { padding:4px 8px;color:var(--mist-950);text-decoration:none;font-size:13px }
</style>
</head>
<body>
<div class="card" style="padding:0;background:transparent;border-radius:0">
  <div class="nav">
    <div class="logo">
      <img src="../assets/k9-elements-logo.png" alt="">
      <span>K9 Elements</span>
    </div>
    <div class="links">
      <a href="#">Trials</a>
      <a href="#">Training</a>
      <a href="#">Events</a>
      <a href="#">About</a>
    </div>
    <div class="actions">
      <a href="#" class="plain">Log in</a>
      <a href="#" class="btn">Get started</a>
    </div>
  </div>
</div>
</body></html>
